<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container" style="text-align: center; max-width: 500px;">
        <h2 style="background: linear-gradient(to right, #4ade80, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Access Granted
        </h2>
        <p style="color: #94a3b8; margin: 20px 0; line-height: 1.6;">
            Welcome back to the dashboard! Oluwadunsin.
        </p>
        <button type="button" id="logoutBtn" style="margin-top: 10px;">Log Out</button>
    </div>

    <script>
        //  logout redirection back to the login screen
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
